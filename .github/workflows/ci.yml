name: F1 Pipeline CI
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                    image: postgres:15
                    env:
                        POSTGRES_PASSWORD: password
                        POSTGRES_DB: f1data
                    ports:
                        - 5432:5432
                    options: >-
                        --health-cmd pg_isready
                        --health-interval 10s
                        --health-timeout 5s
                        --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name: Install dependencies
              run: |
                pip install -r requirements.txt
                pip install pytest

            - name: Run tests
              env:
                DB_HOST: localhost
                DB_PASSWORD: password
                DB_NAME: f1data
                PYTHONPATH: .
              run: |
                pytest tests/ -v